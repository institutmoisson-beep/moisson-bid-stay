<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#D4A017" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/logo-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo-192.png" />

    <!-- Google Fonts - chargé via link pour meilleure compatibilité -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Moisson</title>
    <meta name="description" content="Simple de se loger" />
    <meta name="author" content="Moisson" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Moisson" />
    <meta property="og:description" content="Simple de se loger" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/EdVKgRTOSyfiT8wvq37iiYflNzJ3/social-images/social-1775388116579-IMG_20251121_203056_959.webp" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Moisson" />
    <meta name="twitter:title" content="Moisson" />
    <meta name="twitter:description" content="Simple de se loger" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/EdVKgRTOSyfiT8wvq37iiYflNzJ3/social-images/social-1775388116579-IMG_20251121_203056_959.webp" />

    <!-- Polices de secours si Google Fonts échoue -->
    <style>
      :root {
        --font-heading-fallback: 'Georgia', 'Times New Roman', serif;
        --font-body-fallback: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #0a0a0a;
        color: #f5f0e0;
        font-family: 'Inter', var(--font-body-fallback);
      }
      #root {
        min-height: 100vh;
      }
      /* Ecran de chargement initial */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-logo {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #D4A017, #e6c04a);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-family: 'Playfair Display', var(--font-heading-fallback);
      }
      .loading-dot {
        display: inline-block;
        animation: pulse 1.2s ease-in-out infinite;
      }
      .loading-dot:nth-child(2) { animation-delay: 0.2s; }
      .loading-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </head>

  <body>
    <!-- Ecran de chargement affiché le temps que React monte -->
    <div id="loading-screen">
      <div>
        <div class="loading-logo">Moisson</div>
        <div style="text-align:center;margin-top:12px;color:#888;font-size:14px;">
          <span class="loading-dot">●</span>
          <span class="loading-dot">●</span>
          <span class="loading-dot">●</span>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Masquer l'écran de chargement une fois React monté
      window.addEventListener('load', function() {
        setTimeout(function() {
          var ls = document.getElementById('loading-screen');
          if (ls) {
            ls.classList.add('hidden');
            setTimeout(function() { ls.remove(); }, 400);
          }
        }, 300);
      });
    </script>
  </body>
</html>
